<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Faculty | Ambition Tutorials - Expert Teachers in Mumbai</title>
    <meta name="description" content="Meet the expert faculty at Ambition Tutorials, Vikhroli. Our experienced teachers specialize in School (5th-10th) and Commerce subjects, delivering personalized academic coaching." />
    <meta name="keywords" content="ambition tutorials faculty, expert teachers mumbai, commerce teachers, school subject teachers vikhroli" />
    <meta name="author" content="Ambition Tutorials" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://ambitiontutorials.in/faculty.html" />
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ambitiontutorials.in/faculty.html" />
    <meta property="og:title" content="Faculty | Ambition Tutorials Mumbai" />
    <meta property="og:description" content="Experienced teachers for School & Commerce coaching at Ambition Tutorials, Vikhroli, Mumbai." />
    <meta property="og:image" content="https://ambitiontutorials.in/assets/ambition_logo.png" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Faculty | Ambition Tutorials" />
    <meta name="twitter:description" content="Meet our expert teachers at Ambition Tutorials, Mumbai." />
    <meta name="twitter:image" content="https://ambitiontutorials.in/assets/ambition_logo.png" />
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        {"@type":"ListItem","position":1,"name":"Home","item":"https://ambitiontutorials.in/"},
        {"@type":"ListItem","position":2,"name":"Faculty","item":"https://ambitiontutorials.in/faculty.html"}
      ]
    }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  </head>
  <body>
    <div class="d-flex flex-column min-vh-100">
        <div id="header-placeholder"></div>

        <main class="flex-grow-1">
            <section class="py-5 bg-light min-vh-100">
                <div class="container">
                    <div class="text-center mb-5">
                        <h1 class="fw-bold text-navy">Meet Our Expert Faculty</h1>
                        <p class="text-muted">Highly qualified educators dedicated to your success.</p>
                        <div class="mx-auto bg-gold" style="width: 80px; height: 4px;"></div>
                    </div>

                    <div class="row g-4" id="faculty-container">
                        <!-- Faculty cards will be injected here via JS -->
                    </div>

                    <div class="text-center mt-5 pt-4">
                        <h3 class="fw-bold text-navy mb-3">Want to Learn from the Experts?</h3>
                        <a href="enquiry.html" class="btn btn-premium btn-lg">Book a Free Demo Class</a>
                    </div>
                </div>
            </section>
        </main>
        
        <div id="footer-placeholder"></div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/nav-footer.js"></script>
    <script src="js/main.js"></script>
    <script>
      AOS.init({ duration: 1000, once: true });

      document.addEventListener('DOMContentLoaded', async () => {
          const container = document.getElementById('faculty-container');
          // Reverted to more casual, natural-looking demo placeholder images as requested
          const faculty = [
              { name: "Sumit Sir", qualification: "B.Sc, MCA", experience: "7+ Years", subject_expertise: "Maths", image_url: "https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?q=80&w=400" },
              { name: "Sagar Sir", qualification: "Diploma, BE in Electronical (Polytechnic)", experience: "10+ Years", subject_expertise: "Maths", image_url: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?q=80&w=400" }
          ];

          if (faculty.length > 0) {
              faculty.forEach((member, index) => {
                  const col = document.createElement('div');
                  col.className = 'col-lg-4 col-md-6';
                  col.innerHTML = `
                      <div>
                          <div class="card border-0 shadow-sm rounded-4 overflow-hidden h-100 premium-card">
                              <div class="position-relative">
                                  <img class="card-img-top" src="${member.image_url}" style="height: 350px; object-fit: cover;" alt="${member.name}" onerror="this.src='assets/logo.jpeg'" />
                                  <!-- Replaced bg-navy with a custom gradient to fix hover invisibility issues and increase elegance -->
                                  <div class="position-absolute bottom-0 start-0 w-100 p-4" style="background: linear-gradient(to top, var(--primary-navy), transparent); z-index: 10;">
                                      <h4 class="fw-bold mb-0 text-white" style="text-shadow: 1px 1px 3px rgba(0,0,0,0.5);">${member.name}</h4>
                                      <small class="fw-bold text-white mb-2 d-block" style="text-shadow: 1px 1px 3px rgba(0,0,0,0.5);">${member.qualification}</small>
                                  </div>
                              </div>
                              <div class="card-body p-4 bg-white position-relative" style="z-index: 10;">
                                  <div class="d-flex align-items-center mb-3 gap-2">
                                      <i data-lucide="award" class="text-maroon" width="18"></i>
                                      <span><strong>Expertise:</strong> ${member.subject_expertise}</span>
                                  </div>
                                  <div class="d-flex align-items-center mb-0 gap-2">
                                      <i data-lucide="clock" class="text-maroon" width="18"></i>
                                      <span><strong>Experience:</strong> ${member.experience}</span>
                                  </div>
                              </div>
                          </div>
                      </div>
                  `;
                  container.appendChild(col);
              });
              if (typeof lucide !== 'undefined') {
                  lucide.createIcons();
              }
          } else {
              container.innerHTML = `
                  <div class="col-12 text-center py-5 w-100">
                      <h5 class="text-muted">Faculty information is currently being updated.</h5>
                  </div>
              `;
          }
      });
    </script>
  </body>
</html>
