<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Courses | Ambition Tutorials - School & Commerce Coaching Mumbai</title>
    <meta name="description" content="Explore courses at Ambition Tutorials – School (5th-10th), Commerce (11th-12th), Pre-Board Excellence. Industry-best coaching in Vikhroli, Mumbai." />
    <meta name="keywords" content="coaching courses mumbai, school tuition, commerce coaching, 5th to 10th coaching, 11th 12th commerce, pre-board preparation" />
    <meta name="author" content="Ambition Tutorials" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://ambitiontutorials.in/courses.html" />
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ambitiontutorials.in/courses.html" />
    <meta property="og:title" content="Courses | Ambition Tutorials Mumbai" />
    <meta property="og:description" content="School & Commerce coaching courses in Mumbai. Personalized learning, expert faculty, and proven results." />
    <meta property="og:image" content="https://ambitiontutorials.in/assets/ambition_logo.png" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Courses | Ambition Tutorials" />
    <meta name="twitter:description" content="School & Commerce coaching in Vikhroli, Mumbai." />
    <meta name="twitter:image" content="https://ambitiontutorials.in/assets/ambition_logo.png" />
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        {"@type":"ListItem","position":1,"name":"Home","item":"https://ambitiontutorials.in/"},
        {"@type":"ListItem","position":2,"name":"Courses","item":"https://ambitiontutorials.in/courses.html"}
      ]
    }
    </script>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css" />
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  </head>
  <body>
    <div class="d-flex flex-column min-vh-100">
        <div id="header-placeholder"></div>

        <main class="flex-grow-1">
            <section class="py-5 bg-light min-vh-100">
                <div class="container">
                    <div class="text-center mb-5">
                        <h1 class="fw-bold text-navy">Our Specialized Programs</h1>
                        <p class="text-muted">Choose the right course to accelerate your learning journey.</p>
                        <div class="mx-auto bg-gold" style="width: 80px; height: 4px"></div>
                    </div>

                    <div class="row g-4" id="courses-container">
                        <!-- Courses will be injected here via JS -->
                    </div>
                </div>
            </section>
        </main>
        
        <div id="footer-placeholder"></div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/nav-footer.js"></script>
    <script src="js/main.js"></script>
    <!-- React Courses Component Logic converted to Vanilla JS -->
    <script>
      AOS.init({ duration: 1000, once: true });

      document.addEventListener('DOMContentLoaded', async () => {
          const container = document.getElementById('courses-container');
          const courses = [
                  { title: "Primary Foundation", class_range: "5th - 7th", board: "CBSE/ICSE/State", description: "Cultivating critical thinking and mathematical logic from an early age. Our foundation course bridge the gap between school curriculum and competitive standards." },
                  { title: "Pre-Board Excellence", class_range: "8th - 9th", board: "All Boards", description: "Intensive training for core conceptual clarity in Mathematics and Basic Logic. Quarterly assessments and personalized feedback to identify potential early." },
                  { title: "SSC Board Mastery", class_range: "10th Std", board: "State/CBSE", description: "Comprehensive coverage of the syllabus with 50+ mock tests. Dedicated 'Test-Series' phase with 20 years of solved papers and strategy workshops." },
                  { title: "Commerce (HSC)", class_range: "11th - 12th", board: "State Board", description: "Professional guidance for Book Keeping, Accounts, and Economics. Focus on building professional ethics and career foundation in Finance." },
          ];

          if (courses.length > 0) {
              courses.forEach((course, index) => {
                  const col = document.createElement('div');
                  col.className = 'col-lg-6 col-md-12';
                  col.innerHTML = `
                      <div>
                          <div class="card border-0 shadow-sm rounded-4 overflow-hidden h-100 flex-md-row premium-card">
                              <div class="bg-navy p-4 d-flex align-items-center justify-content-center text-gold" style="min-width: 120px">
                                  <i data-lucide="book" width="40" height="40"></i>
                              </div>
                              <div class="p-4 flex-grow-1">
                                  <div class="d-flex justify-content-between align-items-start mb-2">
                                      <h4 class="fw-bold text-navy mb-0">${course.title}</h4>
                                      <span class="badge bg-gold text-navy px-3 py-2">${course.class_range}</span>
                                  </div>
                                  <p class="text-muted small mb-3">${course.description}</p>
                                  <div class="d-flex align-items-center gap-3 mb-4">
                                      <div class="d-flex align-items-center gap-1 small text-maroon fw-bold">
                                          <i data-lucide="shield" width="16"></i> ${course.board}
                                      </div>
                                      <div class="d-flex align-items-center gap-1 small text-navy fw-bold">
                                          <i data-lucide="zap" width="16"></i> Structured Learning
                                      </div>
                                  </div>
                                  <div class="mt-4">
                                      <a href="enquiry.html" class="btn btn-gold-custom w-100 text-center">Enroll Now</a>
                                  </div>
                              </div>
                          </div>
                      </div>
                  `;
                  container.appendChild(col);
              });
              // Initialize newly added icons and animations
              if (typeof lucide !== 'undefined') {
                  lucide.createIcons();
              }
          } else {
              container.innerHTML = `
                  <div class="col-12 text-center py-5">
                      <h5 class="text-muted">No courses available at the moment.</h5>
                  </div>
              `;
          }
      });
    </script>
  </body>
</html>
