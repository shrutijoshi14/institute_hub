<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="twitter:image" content="https://ambitiontutorials.in/assets/10th result.jpeg" />
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        {"@type":"ListItem","position":1,"name":"Home","item":"https://ambitiontutorials.in/"},
        {"@type":"ListItem","position":2,"name":"Results","item":"https://ambitiontutorials.in/results.html"}
      ]
    }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  </head>
  <body>
    <div class="d-flex flex-column min-vh-100">
        <div id="header-placeholder"></div>

        <main class="flex-grow-1">
            <section class="py-5 bg-light min-vh-100">
                <div class="container">
                    <div class="text-center mb-5">
                        <h1 class="fw-bold text-navy">Our Wall of Fame</h1>
                        <p class="text-muted">Celebrating the excellence and hard work of our bright students.</p>
                        <div class="mx-auto bg-gold" style="width: 80px; height: 4px;"></div>
                    </div>

                    <div id="dynamic-results-container">
                        <!-- Dynamic year-based results injected here via JS -->
                    </div>

                    <div class="text-center mt-5 pt-4">
                        <h3 class="fw-bold text-navy mb-3">Want to Join Our Wall of Fame?</h3>
                        <p class="text-muted mb-4">Start your journey towards academic excellence today.</p>
                        <a href="enquiry.html" class="btn btn-premium btn-lg">Admission Enquiry</a>
                    </div>
                </div>
            </section>
        </main>
        
        <div id="footer-placeholder"></div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/nav-footer.js"></script>
    <script src="js/main.js"></script>
    <script>
      AOS.init({ duration: 1000, once: true });

      document.addEventListener('DOMContentLoaded', async () => {
          const mainContainer = document.getElementById('dynamic-results-container');
          
          // User requested static grouping by year
          // Load the actual master Instagram posters
          // Real data bindings to locally available asset posters
          const resultPosters = [
              { year: '2024-2025', standard: '10th (SSC)', image_url: 'assets/10th result.jpeg' },
              { year: '2023-2024', standard: '10th (SSC)', image_url: 'assets/ssc-2023-2024.png' },
              { year: '2023-2024', standard: '12th (HSC)', image_url: 'assets/WhatsApp Image 2026-03-16 at 4.25.12 PM.jpeg' },
              { year: '2022-2023', standard: '10th (SSC)', image_url: 'assets/ssc topper 2022-2023.png' },
          ];

          // Filter State
          let activeYear = '2024-2025';
          let activeStandard = '10th (SSC)';

          const availableYears = ['2024-2025', '2023-2024', '2022-2023'];
          const availableStandards = ['10th (SSC)', '12th (HSC)'];
          
          mainContainer.innerHTML = '';

          // 1. Create Filter Headers
          const filterWrapper = document.createElement('div');
          filterWrapper.className = 'd-flex flex-column align-items-center mb-5 gap-3';
          mainContainer.appendChild(filterWrapper);

          // Year Filter Group
          const yearFilterContainer = document.createElement('div');
          yearFilterContainer.className = 'd-flex flex-wrap justify-content-center gap-2 p-2 bg-white rounded-pill shadow-sm border border-light';
          
          availableYears.forEach(year => {
              const btn = document.createElement('button');
              // using primary-nav from style.css for active, transparent text-navy for inactive
              btn.className = `btn rounded-pill px-4 py-2 fw-bold transition ${year === activeYear ? 'btn-primary-custom text-white' : 'bg-transparent text-navy border-0'}`;
              btn.innerText = `${year} Batch`;
              btn.onclick = () => {
                  activeYear = year;
                  updateFilters();
                  renderPoster();
              };
              yearFilterContainer.appendChild(btn);
          });
          filterWrapper.appendChild(yearFilterContainer);

          // Standard Filter Group
          const standardFilterContainer = document.createElement('div');
          standardFilterContainer.className = 'd-flex flex-wrap justify-content-center gap-3 mt-4 mb-2';

          availableStandards.forEach(std => {
              const btn = document.createElement('button');
              
              // Distinct square-ish gold outline button to separate entirely from the navy Year pills
              const isActive = std === activeStandard;
              btn.className = `btn px-4 py-2 fw-bold transition ${isActive ? 'btn-gold-custom text-navy shadow-md' : 'bg-white text-navy border border-gold hover-lift shadow-sm'}`;
              btn.style.borderRadius = '12px'; // slightly rounded square instead of pill
              btn.innerText = `${std} Stream`;
              btn.onclick = () => {
                  activeStandard = std;
                  updateFilters();
                  renderPoster();
              };
              standardFilterContainer.appendChild(btn);
          });
          filterWrapper.appendChild(standardFilterContainer);

          // 2. Poster Display Area
          const posterWrapper = document.createElement('div');
          posterWrapper.className = 'w-100';
          mainContainer.appendChild(posterWrapper);

          // Animation style injection
          const style = document.createElement('style');
          style.innerHTML = '.poster-fade { animation: fadeInScale 0.5s cubic-bezier(0.165, 0.84, 0.44, 1) forwards; } @keyframes fadeInScale { from { opacity: 0; transform: translateY(10px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }';
          document.head.appendChild(style);

          // 3. Logic to update visuals
          function updateFilters() {
              Array.from(yearFilterContainer.children).forEach(btn => {
                  const isMatch = btn.innerText.includes(activeYear);
                  btn.className = `btn rounded-pill px-4 py-2 fw-bold transition ${isMatch ? 'btn-primary-custom text-white shadow-md' : 'bg-transparent text-navy border-0 opacity-75'}`;
              });
              
              Array.from(standardFilterContainer.children).forEach(btn => {
                  const isMatch = btn.innerText.includes(activeStandard);
                  btn.className = `btn px-4 py-2 fw-bold transition ${isMatch ? 'btn-gold-custom text-navy shadow-md' : 'bg-white text-navy border border-gold hover-lift shadow-sm'}`;
                  btn.style.borderRadius = '12px';
              });
          }

          function renderPoster() {
              const matches = resultPosters.filter(p => p.year === activeYear && p.standard === activeStandard);
              
              if (matches.length > 0) {
                  const cols = matches.map(m => `
                      <div class="col-lg-6 col-12">
                          <div class="text-center bg-white p-2 rounded-4 shadow-lg premium-card poster-fade">
                              <img src="${m.image_url}" alt="Results ${m.year} ${m.standard}" class="img-fluid rounded-3 w-100" style="border: 2px solid var(--primary-navy);" onerror="this.src='assets/logo.jpeg'"/>
                          </div>
                      </div>
                  `).join('');
                  posterWrapper.innerHTML = `<div class="row justify-content-center g-4">${cols}</div>`;
              } else {
                  posterWrapper.innerHTML = `
                      <div class="text-center py-5 poster-fade">
                          <h5 class="text-muted fw-bold">Results for ${activeYear} - ${activeStandard} will be published soon.</h5>
                      </div>
                  `;
              }
          }

          // Initial render
          renderPoster();
          
          if (typeof lucide !== 'undefined') {
              lucide.createIcons();
          }
      });
    </script>
  </body>
</html>
